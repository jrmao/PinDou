<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinDou - 拼豆图案设计工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        .toolbar button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .toolbar button.active {
            background: #e94560;
            color: white;
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左侧颜色盘 */
        .color-panel {
            width: 220px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            overflow-y: auto;
            padding: 12px;
        }

        /* 画布区域 */
        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f0f23;
            overflow: hidden;
            position: relative;
        }

        #pixelCanvas {
            border: 2px solid #e94560;
            cursor: crosshair;
            image-rendering: pixelated;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            gap: 24px;
            padding: 8px 16px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            font-size: 12px;
            color: #888;
        }

        /* 颜色盘样式 */
        .color-panel h3 {
            margin-bottom: 8px;
            font-size: 14px;
            color: #e94560;
        }

        .color-series {
            margin-bottom: 12px;
        }

        .color-series h4 {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
        }

        .color-btn {
            width: 28px;
            height: 28px;
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.selected {
            border: 2px solid white;
        }

        /* 工具按钮组 */
        .tool-group {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .tool-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            background: #0f3460;
            color: #eee;
        }

        .tool-btn:hover {
            background: #1a4a80;
        }

        .tool-btn.active {
            background: #e94560;
            color: white;
        }

        .tool-btn.eraser-active {
            background: #ff6b6b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <button id="btnEditor" class="active" title="像素画编辑器">编辑器</button>
            <button id="btnImageConvert" title="图片转图案">图片转图案</button>
            <button id="btnTemplates" title="图案模板库">模板库</button>
            <div class="tool-group" style="margin-left:16px; border-left:1px solid #0f3460; padding-left:16px;">
                <button id="btnPencil" class="tool-btn active" title="铅笔工具">铅笔</button>
                <button id="btnEraser" class="tool-btn" title="橡皮擦（擦除颜色）">橡皮擦</button>
            </div>
            <div style="flex:1"></div>
            <button id="btnClear" title="清除画布">清除</button>
            <button id="btnClearCache" title="清除缓存数据">清除缓存</button>
            <button id="btnExport" title="导出PNG">导出PNG</button>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧颜色盘 -->
            <div class="color-panel" id="colorPanel">
                <h3>颜色盘</h3>
                <div id="colorList"></div>
            </div>

            <!-- 画布区域 -->
            <div class="canvas-container" id="canvasContainer">
                <canvas id="pixelCanvas"></canvas>

                <!-- 模板库面板（初始隐藏） -->
                <div id="templatePanel" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#16213e; padding:24px; border-radius:12px; z-index:100; max-width:500px;">
                    <h3>图案模板库</h3>
                    <div id="templateList" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:16px 0; max-height:400px; overflow-y:auto;"></div>
                    <button id="btnCloseTemplates" style="padding:8px 24px; background:#444; color:white; border:none; border-radius:6px; cursor:pointer;">关闭</button>
                </div>
            </div>
        </div>

        <!-- 算法参数滑块 -->
        <div id="algoParamsPanel" style="display:block; background:#1a1a2e; padding:12px 16px; border-top:1px solid #0f3460;">
            <div style="display:flex; gap:24px; align-items:center; flex-wrap:wrap;">
                <div>
                    <label style="font-size:12px; color:#eee;">去噪：<span id="denoiseValue">3</span></label><br>
                    <input type="range" id="denoiseLevelMain" min="0" max="10" value="3"
                        style="width:120px;"
                        oninput="document.getElementById('denoiseValue').textContent=this.value; convertImageToPattern(false);" />
                </div>
                <div>
                    <label style="font-size:12px; color:#eee;">背景敏感度：<span id="sensitivityValue">5</span></label><br>
                    <input type="range" id="bgSensitivityMain" min="0" max="10" value="5"
                        style="width:120px;"
                        oninput="document.getElementById('sensitivityValue').textContent=this.value; convertImageToPattern(false);" />
                </div>
                <div>
                    <label style="font-size:12px; color:#eee;">边缘锐度：<span id="edgeValue">5</span></label><br>
                    <input type="range" id="edgeSharpnessMain" min="0" max="10" value="5"
                        style="width:120px;"
                        oninput="document.getElementById('edgeValue').textContent=this.value; convertImageToPattern(false);" />
            </div>
        </div>

        <!-- 图片上传弹窗（放在body层级，避免被父容器overflow截断） -->
        <div id="imageConvertPanel" style="display:none; position:fixed; top:5vh; left:50%; transform:translateX(-50%); background:#16213e; padding:24px; border-radius:12px; z-index:1000; max-height:90vh; overflow-y:auto; width:400px;">
        <h3>图片转图案</h3>
        <input type="file" id="imageInput" accept="image/png,image/jpeg" />
        <div style="margin:16px 0;">
            <label>网格尺寸: <select id="gridSizeSelect">
                <option value="8">8×8</option>
                <option value="16">16×16</option>
                <option value="29">29×29</option>
                <option value="50">50×50</option>
                <option value="100">100×100</option>
                <option value="custom">自定义</option>
            </select></label>
        </div>
        <div id="customSizePanel" style="display:none; margin:8px 0;">
            <label>宽度: <input type="number" id="customWidth" value="50" min="8" max="200" style="width:60px;" /></label>
            <label style="margin-left:8px;">高度: <input type="number" id="customHeight" value="50" min="8" max="200" style="width:60px;" /></label>
        </div>
        <input type="hidden" id="denoiseLevel" value="3" />
        <input type="hidden" id="bgSensitivity" value="5" />
        <input type="hidden" id="edgeSharpness" value="5" />
        <div style="margin:8px 0; font-size:11px; color:#888;">参数已在下方滑块调节</div>
        <div id="imagePreview" style="margin:16px 0; max-width:300px; max-height:300px;">
            <img id="previewImg" style="max-width:100%; max-height:100%;" />
        </div>
        <button id="btnConvert" style="padding:8px 24px; background:#e94560; color:white; border:none; border-radius:6px; cursor:pointer;">转换</button>
        <button id="btnCancelConvert" style="padding:8px 24px; margin-left:8px; background:#444; color:white; border:none; border-radius:6px; cursor:pointer;">取消</button>
    </div>

    <!-- 主内容区结束 -->
    <!-- 状态栏 -->
    <div class="status-bar">
            <span id="statusSize">画布: 29×29</span>
            <span id="statusZoom">缩放: 100%</span>
        </div>
    </div>
</body>

// 工具定义
const TOOLS = {
    PENCIL: 'pencil',
    ERASER: 'eraser',
    FILL: 'fill',
    RECT: 'rect',
    LINE: 'line'
};

// 画布限制
const CANVAS_MIN_SIZE = 10;
const CANVAS_MAX_SIZE = 200;
const DEFAULT_CANVAS_SIZE = 29;

// ============================================
// 状态管理
// ============================================

const state = {
    canvasWidth: DEFAULT_CANVAS_SIZE,
    canvasHeight: DEFAULT_CANVAS_SIZE,
    currentTool: TOOLS.PENCIL,
    currentColor: '#FF0000',
    zoom: 1,
    minZoom: 0.25,   // 最小缩放
    maxZoom: 4,       // 最大缩放
    panX: 0,        // 画布平移 X
    panY: 0,        // 画布平移 Y
    isDrawing: false,
    isPanning: false, // 是否在平移中
    startX: 0,
    startY: 0,
    panStartX: 0,    // 平移起始 X
    panStartY: 0,    // 平移起始 Y
    gridData: null,  // 二维数组存储像素颜色
    history: [],     // 撤销/重做历史
    historyIndex: -1
};

// 初始化 gridData
initGridData();

// ============================================
// LocalStorage 存储
// ============================================

const STORAGE_KEY = 'pindou_works';

function autoSave() {
    const data = {
        width: state.canvasWidth,
        height: state.canvasHeight,
        gridData: state.gridData,
        timestamp: Date.now()
    };
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        console.warn('自动保存失败:', e);
    }
}

function loadFromStorage() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return false;

    try {
        const data = JSON.parse(saved);
        state.canvasWidth = data.width;
        state.canvasHeight = data.height;
        state.gridData = data.gridData;

        canvas.width = state.canvasWidth * PIXEL_SIZE;
        canvas.height = state.canvasHeight * PIXEL_SIZE;

        renderCanvas();
        saveToHistory();
        return true;
    } catch (e) {
        console.error('Failed to load saved data:', e);
        return false;
    }
}

// 定时保存（每30秒）
let autoSaveInterval = setInterval(autoSave, 30000);

// ============================================
// 画布操作
// ============================================

let canvas, ctx;
const PIXEL_SIZE = 16;  // 每个像素在屏幕上的大小

function initCanvas() {
    canvas = document.getElementById('pixelCanvas');
    ctx = canvas.getContext('2d');

    // 设置 canvas 尺寸
    canvas.width = state.canvasWidth * PIXEL_SIZE;
    canvas.height = state.canvasHeight * PIXEL_SIZE;

    // 如果 gridData 还没有初始化（首次加载时），则初始化
    // 注意：loadFromStorage() 会设置 gridData，不要覆盖
    if (!state.gridData) {
        initGridData();
    }

    // 渲染
    renderCanvas();

    // 保存初始历史
    saveToHistory();
}

function updateCanvasTransform() {
    const scale = state.zoom;
    const tx = state.panX;
    const ty = state.panY;
    canvas.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    canvas.style.transformOrigin = '0 0';
}

function renderCanvas() {
    // 清空画布
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 绘制每个像素
    for (let y = 0; y < state.canvasHeight; y++) {
        for (let x = 0; x < state.canvasWidth; x++) {
            const color = state.gridData[y][x];
            if (color) {
                ctx.fillStyle = color;
                ctx.fillRect(
                    x * PIXEL_SIZE,
                    y * PIXEL_SIZE,
                    PIXEL_SIZE,
                    PIXEL_SIZE
                );
            }
        }
    }

    // 绘制网格线
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= state.canvasWidth; x++) {
        ctx.beginPath();
        ctx.moveTo(x * PIXEL_SIZE, 0);
        ctx.lineTo(x * PIXEL_SIZE, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y <= state.canvasHeight; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * PIXEL_SIZE);
        ctx.lineTo(canvas.width, y * PIXEL_SIZE);
        ctx.stroke();
    }

    updateCanvasTransform();
    updateStatusBar();
}

// 事件处理
function handleCanvasMouseDown(e) {
    // 中键或右键按下时开始平移
    if (e.button === 1 || e.button === 2) {
        state.isPanning = true;
        state.panStartX = e.clientX - state.panX;
        state.panStartY = e.clientY - state.panY;
        e.preventDefault();
        return;
    }

    if (!canvas || !ctx) return;

    try {
        state.isDrawing = true;
        const rect = canvas.getBoundingClientRect();
        if (rect.width <= 0 || rect.height <= 0) return;

        // getBoundingClientRect 已经考虑了 transform，直接计算相对于画布的位置
        const x = Math.floor((e.clientX - rect.left) / (PIXEL_SIZE * state.zoom));
        const y = Math.floor((e.clientY - rect.top) / (PIXEL_SIZE * state.zoom));
        state.startX = x;
        state.startY = y;

        if (state.currentTool === TOOLS.FILL) {
            floodFill(x, y, state.currentColor);
        } else {
            setPixel(x, y, state.currentColor);
        }
    } catch (err) {
        console.warn('Canvas mouse down error:', err);
        state.isDrawing = false;
    }
}

function handleCanvasMouseMove(e) {
    // 平移模式
    if (state.isPanning) {
        state.panX = e.clientX - state.panStartX;
        state.panY = e.clientY - state.panStartY;
        updateCanvasTransform();
        return;
    }

    if (!state.isDrawing || !canvas) return;

    try {
        const rect = canvas.getBoundingClientRect();
        if (rect.width <= 0 || rect.height <= 0) return;

        const x = Math.floor((e.clientX - rect.left) / (PIXEL_SIZE * state.zoom));
        const y = Math.floor((e.clientY - rect.top) / (PIXEL_SIZE * state.zoom));

        if (state.currentTool === TOOLS.PENCIL) {
            setPixel(x, y, state.currentColor);
        } else if (state.currentTool === TOOLS.ERASER) {
            setPixel(x, y, null);
        }
    } catch (err) {
        console.warn('Canvas mouse move error:', err);
    }
}

function handleCanvasMouseUp(e) {
    if (state.isPanning) {
        state.isPanning = false;
        return;
    }
    if (state.isDrawing && state.currentTool !== TOOLS.PENCIL && state.currentTool !== TOOLS.ERASER && state.currentTool !== TOOLS.FILL) {
        try {
            if (!canvas) return;
            const rect = canvas.getBoundingClientRect();
            if (rect.width <= 0 || rect.height <= 0) return;

            const x = Math.floor((e.clientX - rect.left) / (PIXEL_SIZE * state.zoom));
            const y = Math.floor((e.clientY - rect.top) / (PIXEL_SIZE * state.zoom));
            drawShape(state.startX, state.startY, x, y, state.currentColor);
        } catch (err) {
            console.warn('Canvas mouse up error:', err);
        }
    }
    state.isDrawing = false;
    saveToHistory();
}

function setPixel(x, y, color) {
    if (x >= 0 && x < state.canvasWidth && y >= 0 && y < state.canvasHeight) {
        state.gridData[y][x] = color;
        renderCanvas();
        autoSave();
    }
}

function floodFill(x, y, color) {
    if (x < 0 || x >= state.canvasWidth || y < 0 || y >= state.canvasHeight) return;
    const targetColor = state.gridData[y][x];
    if (targetColor === color) return;

    const stack = [[x, y]];
    const visited = new Set();

    while (stack.length > 0) {
        const [cx, cy] = stack.pop();
        const key = `${cx},${cy}`;

        if (visited.has(key)) continue;
        if (cx < 0 || cx >= state.canvasWidth || cy < 0 || cy >= state.canvasHeight) continue;
        if (state.gridData[cy][cx] !== targetColor) continue;

        visited.add(key);
        state.gridData[cy][cx] = color;

        stack.push([cx + 1, cy]);
        stack.push([cx - 1, cy]);
        stack.push([cx, cy + 1]);
        stack.push([cx, cy - 1]);
    }

    renderCanvas();
    autoSave();
}

function drawShape(x1, y1, x2, y2, color) {
    // 简化的矩形绘制
    const minX = Math.min(x1, x2);
    const maxX = Math.max(x1, x2);
    const minY = Math.min(y1, y2);
    const maxY = Math.max(y1, y2);

    for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
            if (x >= 0 && x < state.canvasWidth && y >= 0 && y < state.canvasHeight) {
                state.gridData[y][x] = color;
            }
        }
    }

    renderCanvas();
    autoSave();
}

function updateStatusBar() {
    document.getElementById('statusSize').textContent =
        `画布: ${state.canvasWidth}×${state.canvasHeight}`;
    document.getElementById('statusZoom').textContent =
        `缩放: ${Math.round(state.zoom * 100)}%`;
}

// ============================================
// 导出功能
// ============================================

function exportAsPNG() {
    // 根据画布尺寸动态调整像素大小（确保100×100时图片约3MB）
    const baseCellSize = state.canvasWidth >= 100 || state.canvasHeight >= 100 ? 60 : 40;
    const CELL_SIZE = baseCellSize;
    const LABEL_WIDTH = 50;   // 序号标签宽度（增大）
    const GRID_GAP = 10;      // 辅助线间隔（每10格一道）

    // 计算画布尺寸（包含序号区域）
    const patternWidth = state.canvasWidth * CELL_SIZE;
    const patternHeight = state.canvasHeight * CELL_SIZE;
    const totalWidth = patternWidth + LABEL_WIDTH;
    const totalHeight = patternHeight + LABEL_WIDTH;

    // 创建导出用的临时 canvas
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = totalWidth;
    exportCanvas.height = totalHeight;
    const exportCtx = exportCanvas.getContext('2d');

    // 白色背景
    exportCtx.fillStyle = '#ffffff';
    exportCtx.fillRect(0, 0, totalWidth, totalHeight);

    // 绘制序号背景
    exportCtx.fillStyle = '#f0f0f0';
    exportCtx.fillRect(0, 0, LABEL_WIDTH, LABEL_WIDTH);

    // 绘制列序号（上方）- 加粗加大
    exportCtx.fillStyle = '#000000';
    exportCtx.font = 'bold 12px monospace';
    exportCtx.textAlign = 'center';
    exportCtx.textBaseline = 'middle';
    for (let x = 0; x < state.canvasWidth; x++) {
        const cx = LABEL_WIDTH + x * CELL_SIZE + CELL_SIZE / 2;
        const cy = LABEL_WIDTH / 2;
        exportCtx.fillText((x + 1).toString(), cx, cy);
    }

    // 绘制行序号（左侧）- 加粗加大
    exportCtx.textAlign = 'center';
    for (let y = 0; y < state.canvasHeight; y++) {
        const cx = LABEL_WIDTH / 2;
        const cy = LABEL_WIDTH + y * CELL_SIZE + CELL_SIZE / 2;
        exportCtx.fillText((y + 1).toString(), cx, cy);
    }

    // 绘制像素格子
    for (let y = 0; y < state.canvasHeight; y++) {
        for (let x = 0; x < state.canvasWidth; x++) {
            const color = state.gridData[y][x];
            const px = LABEL_WIDTH + x * CELL_SIZE;
            const py = LABEL_WIDTH + y * CELL_SIZE;

            if (color) {
                exportCtx.fillStyle = color;
                exportCtx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
            }

            // 绘制格子边框（浅灰）
            exportCtx.strokeStyle = '#dddddd';
            exportCtx.lineWidth = 0.5;
            exportCtx.strokeRect(px, py, CELL_SIZE, CELL_SIZE);

            // 在格子中心显示色号 - 加黑加粗
            if (CELL_SIZE >= 15) {
                exportCtx.textAlign = 'center';
                exportCtx.textBaseline = 'middle';

                // 找到对应的色号
                const colorNum = findColorNumber(color);
                if (colorNum) {
                    // 根据背景颜色决定文字颜色（保证对比度）
                    const rgb = hexToRgb(color);
                    const brightness = (rgb.r * 299 + rgb.g * 587 + rgb.b * 114) / 1000;
                    const textColor = brightness > 128 ? '#000000' : '#ffffff';

                    // 绘制文字描边（加粗效果）
                    exportCtx.strokeStyle = brightness > 128 ? '#ffffff' : '#000000';
                    exportCtx.lineWidth = 3;
                    exportCtx.font = `bold ${Math.max(10, CELL_SIZE / 4)}px monospace`;
                    exportCtx.strokeText(colorNum, px + CELL_SIZE / 2, py + CELL_SIZE / 2);

                    // 绘制文字
                    exportCtx.fillStyle = textColor;
                    exportCtx.fillText(colorNum, px + CELL_SIZE / 2, py + CELL_SIZE / 2);
                }
            }
        }
    }

    // 绘制辅助线（每10格一道，深色醒目线条）
    exportCtx.strokeStyle = '#333333';
    exportCtx.lineWidth = 2;

    // 垂直辅助线
    for (let x = 10; x < state.canvasWidth; x += GRID_GAP) {
        const px = LABEL_WIDTH + x * CELL_SIZE;
        exportCtx.beginPath();
        exportCtx.moveTo(px, LABEL_WIDTH);
        exportCtx.lineTo(px, totalHeight);
        exportCtx.stroke();
    }

    // 水平辅助线
    for (let y = 10; y < state.canvasHeight; y += GRID_GAP) {
        const py = LABEL_WIDTH + y * CELL_SIZE;
        exportCtx.beginPath();
        exportCtx.moveTo(LABEL_WIDTH, py);
        exportCtx.lineTo(totalWidth, py);
        exportCtx.stroke();
    }

    // 绘制分隔线（序号区域边框）
    exportCtx.strokeStyle = '#666666';
    exportCtx.lineWidth = 2;
    exportCtx.beginPath();
    exportCtx.moveTo(LABEL_WIDTH, 0);
    exportCtx.lineTo(LABEL_WIDTH, totalHeight);
    exportCtx.moveTo(0, LABEL_WIDTH);
    exportCtx.lineTo(totalWidth, LABEL_WIDTH);
    exportCtx.stroke();

    // 转换为 Blob 并下载（高质量 PNG）
    // 使用 larger canvas 和更高质量的设置
    exportCanvas.toBlob((blob) => {
        // 如果图片太小（目标3MB），尝试增大像素
        if (blob.size < 2 * 1024 * 1024 && CELL_SIZE < 80) {
            // 重新以更大尺寸绘制
            const scale = 2;
            const scaledCanvas = document.createElement('canvas');
            scaledCanvas.width = totalWidth * scale;
            scaledCanvas.height = totalHeight * scale;
            const scaledCtx = scaledCanvas.getContext('2d');
            scaledCtx.scale(scale, scale);
            scaledCtx.drawImage(exportCanvas, 0, 0);

            scaledCanvas.toBlob((newBlob) => {
                const url = URL.createObjectURL(newBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pindou-${Date.now()}.png`;
                a.click();
                URL.revokeObjectURL(url);
            }, 'image/png');
        } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pindou-${Date.now()}.png`;
            a.click();
            URL.revokeObjectURL(url);
        }
    }, 'image/png');
}

// 根据颜色值查找色号
function findColorNumber(color) {
    if (!color) return null;
    for (const c of MARD_COLORS) {
        if (c.color.toLowerCase() === color.toLowerCase()) {
            return c.num;
        }
    }
    return null;
}

// ============================================
// 工具函数
// ============================================

function deepCopy(obj) {
    return structuredClone(obj);
}

function initGridData() {
    state.gridData = [];
    for (let y = 0; y < state.canvasHeight; y++) {
        const row = [];
        for (let x = 0; x < state.canvasWidth; x++) {
            row.push(null);
        }
        state.gridData.push(row);
    }
}

function saveToHistory() {
    // 移除当前位置之后的历史
    state.history = state.history.slice(0, state.historyIndex + 1);
    // 保存当前状态
    state.history.push(deepCopy(state.gridData));
    state.historyIndex++;
    // 限制历史记录数量
    if (state.history.length > 50) {
        state.history.shift();
        state.historyIndex--;
    }
}

function undo() {
    if (state.historyIndex > 0) {
        state.historyIndex--;
        state.gridData = deepCopy(state.history[state.historyIndex]);
        renderCanvas();
    }
}

function redo() {
    if (state.historyIndex < state.history.length - 1) {
        state.historyIndex++;
        state.gridData = deepCopy(state.history[state.historyIndex]);
        renderCanvas();
    }
}

let uploadedImage = null;

function showImageConvertPanel() {

}

function hideImageConvertPanel() {

}

function showTemplatePanel() {
    const templateList = document.getElementById('templateList');
    if (!templateList) return;
    templateList.innerHTML = '';

    BUILT_IN_TEMPLATES.forEach((template, index) => {
        const templateCard = document.createElement('div');
        templateCard.style.cssText = 'background:#0f3460; padding:12px; border-radius:8px; cursor:pointer; text-align:center;';
        templateCard.innerHTML = `
            <div style="width:60px; height:60px; margin:0 auto 8px; display:flex; align-items:center; justify-content:center; font-size:24px;">
                ${template.name[0]}
            </div>
            <div style="font-size:12px;">${template.name}</div>
        `;
        templateCard.addEventListener('click', () => loadTemplate(index));
        templateList.appendChild(templateCard);
    });

    document.getElementById('templatePanel').style.display = 'block';
}

function hideTemplatePanel() {
    document.getElementById('templatePanel').style.display = 'none';
}

function loadTemplate(index) {
    const template = BUILT_IN_TEMPLATES[index];
    if (!template) return;

    state.canvasWidth = template.width;
    state.canvasHeight = template.height;
    canvas.width = template.width * PIXEL_SIZE;
    canvas.height = template.height * PIXEL_SIZE;

    state.gridData = [];
    for (let y = 0; y < template.height; y++) {
        const row = [];
        for (let x = 0; x < template.width; x++) {
            row.push(template.data[y * template.width + x]);
        }
        state.gridData.push(row);
    }

    renderCanvas();
    saveToHistory();
    hideTemplatePanel();
}

function handleImageUpload(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
            uploadedImage = img;
            document.getElementById('previewImg').src = event.target.result;
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

/**
 * 实时预览更新 - 当有上传图片且滑块变化时调用
 */
function updateImagePreview() {
    if (!uploadedImage) return;

    const denoiseLevel = parseInt(document.getElementById('denoiseLevelMain')?.value || '3');
    const bgSensitivity = parseInt(document.getElementById('bgSensitivityMain')?.value || '5');
    const edgeSharpness = parseInt(document.getElementById('edgeSharpnessMain')?.value || '5');

    const previewSize = 50;
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = previewSize;
    tempCanvas.height = previewSize;
    const tempCtx = tempCanvas.getContext('2d');

    // 绘制缩略图
    tempCtx.drawImage(uploadedImage, 0, 0, previewSize, previewSize);
    const imageData = tempCtx.getImageData(0, 0, previewSize, previewSize);

    const previewGrid = [];
    for (let y = 0; y < previewSize; y++) {
        previewGrid[y] = [];
        for (let x = 0; x < previewSize; x++) {
            const idx = (y * previewSize + x) * 4;
            const r = imageData.data[idx];
            const g = imageData.data[idx + 1];
            const b = imageData.data[idx + 2];
            const a = imageData.data[idx + 3];

            const isEmpty = isBackgroundColor(r, g, b, a, x, y, previewSize, previewSize, bgSensitivity, edgeSharpness);
            previewGrid[y][x] = isEmpty ? '#FFFFFF' : findClosestColorLab(r, g, b);
        }
    }

    // 临时修改 state 以便 enhanceColorBlocks 处理预览尺寸
    const originalWidth = state.canvasWidth;
    const originalHeight = state.canvasHeight;
    const originalGridData = state.gridData;
    state.canvasWidth = previewSize;
    state.canvasHeight = previewSize;
    state.gridData = previewGrid;

    // 应用色块增强
    enhanceColorBlocks(denoiseLevel, edgeSharpness);

    // 渲染到预览 canvas
    const previewCanvas = document.createElement('canvas');
    previewCanvas.width = previewSize;
    previewCanvas.height = previewSize;
    const previewCtx = previewCanvas.getContext('2d');

    for (let y = 0; y < previewSize; y++) {
        for (let x = 0; x < previewSize; x++) {
            previewCtx.fillStyle = state.gridData[y][x];
            previewCtx.fillRect(x, y, 1, 1);
        }
    }

    // 恢复原始 state
    state.canvasWidth = originalWidth;
    state.canvasHeight = originalHeight;
    state.gridData = originalGridData;

    const previewImg = document.getElementById('previewImg');
    if (previewImg) {
        previewImg.src = previewCanvas.toDataURL();
    }
}

function convertImageToPattern(closePanel = true) {
    if (!uploadedImage) return;

    let gridWidth, gridHeight;

    // 获取尺寸设置
    const sizeSelect = document.getElementById('gridSizeSelect').value;
    if (sizeSelect === 'custom') {
        gridWidth = parseInt(document.getElementById('customWidth').value) || 50;
        gridHeight = parseInt(document.getElementById('customHeight').value) || 50;
        // 限制范围
        gridWidth = Math.max(8, Math.min(200, gridWidth));
        gridHeight = Math.max(8, Math.min(200, gridHeight));
    } else {
        gridWidth = gridHeight = parseInt(sizeSelect);
    }

    // 获取算法参数（从主界面滑块读取）
    const denoiseLevel = parseInt(document.getElementById('denoiseLevelMain')?.value || '3');
    const bgSensitivity = parseInt(document.getElementById('bgSensitivityMain')?.value || '5');
    const edgeSharpness = parseInt(document.getElementById('edgeSharpnessMain')?.value || '5');

    // 创建临时 canvas 来采样图片
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = gridWidth;
    tempCanvas.height = gridHeight;
    const tempCtx = tempCanvas.getContext('2d');

    // 绘制并缩放图片（保持宽高比）
    tempCtx.drawImage(uploadedImage, 0, 0, gridWidth, gridHeight);

    // 获取像素数据
    const imageData = tempCtx.getImageData(0, 0, gridWidth, gridHeight);

    // 调整画布尺寸
    state.canvasWidth = gridWidth;
    state.canvasHeight = gridHeight;
    canvas.width = gridWidth * PIXEL_SIZE;
    canvas.height = gridHeight * PIXEL_SIZE;
    initGridData();

    // 转换每个像素
    for (let y = 0; y < gridHeight; y++) {
        for (let x = 0; x < gridWidth; x++) {
            const idx = (y * gridWidth + x) * 4;
            const r = imageData.data[idx];
            const g = imageData.data[idx + 1];
            const b = imageData.data[idx + 2];
            const a = imageData.data[idx + 3];

            // 检测是否为空白/透明/接近白色的背景
            const isEmpty = isBackgroundColor(r, g, b, a, x, y, gridWidth, gridHeight, bgSensitivity, edgeSharpness);
            if (isEmpty) {
                // 背景用白色
                state.gridData[y][x] = '#FFFFFF';
            } else {
                const matchedColor = findClosestColorLab(r, g, b);
                state.gridData[y][x] = matchedColor;
            }
        }
    }

    // 对小尺寸图像应用色块融合和边界增强算法
    if (gridWidth <= 100 || gridHeight <= 100) {
        enhanceColorBlocks(denoiseLevel, edgeSharpness);
    }

    renderCanvas();
    saveToHistory();
    if (closePanel) {
        hideImageConvertPanel();
    }
}

// 色块融合和边界增强算法（针对小尺寸图像）
/**
 * 色块增强处理
 * @param {number} denoiseLevel - 去噪强度 (0-10)
 * @param {number} edgeSharpness - 边缘锐度 (0-10)
 */
function enhanceColorBlocks(denoiseLevel = 3, edgeSharpness = 5) {
    const width = state.canvasWidth;
    const height = state.canvasHeight;

    // 根据去噪强度计算小区域阈值
    // denoiseLevel 0-10: minRegionSize 从 2 到 8
    const minRegionSize = Math.max(2, Math.floor(denoiseLevel * 0.6));

    // 颜色差异阈值
    const threshold = 15;

    const tempGrid = state.gridData.map(row => [...row]);
    const visited = Array.from({ length: height }, () => Array(width).fill(false));

    const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];

    function colorDistance(c1, c2) {
        if (!c1 || !c2) return Infinity;
        const rgb1 = hexToRgb(c1);
        const rgb2 = hexToRgb(c2);
        return Math.sqrt(
            Math.pow(rgb1.r - rgb2.r, 2) +
            Math.pow(rgb1.g - rgb2.g, 2) +
            Math.pow(rgb1.b - rgb2.b, 2)
        );
    }

    function floodFillMerge(startX, startY, targetColor) {
        const queue = [[startX, startY]];
        const region = [];

        while (queue.length > 0) {
            const [x, y] = queue.shift();
            if (x < 0 || x >= width || y < 0 || y >= height) continue;
            if (visited[y][x]) continue;
            if (tempGrid[y][x] !== targetColor) continue;

            visited[y][x] = true;
            region.push([x, y]);

            for (const [dx, dy] of directions) {
                queue.push([x + dx, y + dy]);
            }
        }

        return region;
    }

    // 根据边缘锐度计算边缘区域边距
    // edgeSharpness 0-10: margin 从 1 到 5 (高锐度=大边距=捕获更多边缘像素)
    const margin = Math.max(1, Math.floor(edgeSharpness * 0.4) + 1);

    // 遍历所有格子进行区域生长
    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            if (visited[y][x]) continue;

            const currentColor = tempGrid[y][x];
            const region = floodFillMerge(x, y, currentColor);

            // 使用参数化的小区域阈值
            if (region.length <= minRegionSize) {
                // 找到周围的主要颜色
                const neighborColors = {};
                for (const [rx, ry] of region) {
                    for (const [dx, dy] of directions) {
                        const nx = rx + dx, ny = ry + dy;
                        if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                            const nc = tempGrid[ny][nx];
                            if (nc !== currentColor) {
                                neighborColors[nc] = (neighborColors[nc] || 0) + 1;
                            }
                        }
                    }
                }

                let maxCount = 0;
                let mainColor = null;
                for (const [color, count] of Object.entries(neighborColors)) {
                    if (count > maxCount) {
                        maxCount = count;
                        mainColor = color;
                    }
                }

                // 只有在边缘区域且差异不大时才合并
                if (mainColor &&
                    colorDistance(currentColor, mainColor) < threshold * 2 &&
                    isEdgeRegion(region[0][0], region[0][1], width, height, margin)) {
                    for (const [rx, ry] of region) {
                        state.gridData[ry][rx] = mainColor;
                    }
                }
            }
        }
    }
}

// ============================================
// 背景检测（增强版：添加位置上下文）
// ============================================

/**
 * 检测是否为背景色
 * @param {number} r - 红色通道
 * @param {number} g - 绿色通道
 * @param {number} b - 蓝色通道
 * @param {number} a - Alpha 通道
 * @param {number} x - 像素 X 坐标
 * @param {number} y - 像素 Y 坐标
 * @param {number} width - 画布宽度
 * @param {number} height - 画布高度
 * @param {number} sensitivity - 背景敏感度 (0-10)
 * @param {number} edgeSharpness - 边缘锐度 (0-10)
 * @returns {boolean}
 */
function isBackgroundColor(r, g, b, a, x, y, width, height, sensitivity = 5, edgeSharpness = 5) {
    // 透明像素一定是背景
    if (a < 128) return true;

    const brightness = (r + g + b) / 3;
    const saturation = Math.max(r, g, b) - Math.min(r, g, b);

    // 根据敏感度计算阈值
    // sensitivity 0-10: 亮度阈值从 250 降到 235, 饱和度阈值从 25降到 10
    const brightnessThreshold = 250 - (sensitivity * 1.5);
    const saturationThreshold = 25 - (sensitivity * 1.5);

    // 非常亮的单色区域
    if (brightness > brightnessThreshold && saturation < saturationThreshold) {
        // 只有在边缘区域才判定为背景，使用 edgeSharpness 计算边距
        const margin = Math.max(1, Math.floor(edgeSharpness * 0.4) + 1);
        if (isEdgeRegion(x, y, width, height, margin)) {
            return true;
        }
    }

    return false;
}

/**
 * 判断是否为边缘区域
 * @param {number} x - 像素 X 坐标
 * @param {number} y - 像素 Y 坐标
 * @param {number} width - 画布宽度
 * @param {number} height - 画布高度
 * @param {number} margin - 边缘宽度（像素）
 * @returns {boolean}
 */
function isEdgeRegion(x, y, width, height, margin = 3) {
    return x < margin || x >= width - margin || y < margin || y >= height - margin;
}

// ============================================
// 颜色匹配算法（优化版：使用 LAB 色彩空间）
// ============================================

// RGB 转 LAB（通过 XYZ）
function rgbToLab(r, g, b) {
    // RGB 转 normalized RGB (0-1)
    let rr = r / 255, gg = g / 255, bb = b / 255;

    // Gamma 校正
    rr = rr > 0.04045 ? Math.pow((rr + 0.055) / 1.055, 2.4) : rr / 12.92;
    gg = gg > 0.04045 ? Math.pow((gg + 0.055) / 1.055, 2.4) : gg / 12.92;
    bb = bb > 0.04045 ? Math.pow((bb + 0.055) / 1.055, 2.4) : bb / 12.92;

    // 转 XYZ
    let x = (rr * 0.4124564 + gg * 0.3575761 + bb * 0.1804375) / 0.95047;
    let y = (rr * 0.2126729 + gg * 0.7151522 + bb * 0.0721750);
    let z = (rr * 0.0193339 + gg * 0.1191920 + bb * 0.9503041) / 1.08883;

    // XYZ 转 LAB
    x = x > 0.008856 ? Math.pow(x, 1/3) : (7.787 * x) + 16/116;
    y = y > 0.008856 ? Math.pow(y, 1/3) : (7.787 * y) + 16/116;
    z = z > 0.008856 ? Math.pow(z, 1/3) : (7.787 * z) + 16/116;

    const L = (116 * y) - 16;
    const a = 500 * (x - y);
    const bLab = 200 * (y - z);

    return { L, a, b: bLab };
}

// CIEDE2000 色差公式（简化版，返回更准确的颜色差异感知度量）
function ciede2000(rgb1, rgb2) {
    const lab1 = rgbToLab(rgb1.r, rgb1.g, rgb1.b);
    const lab2 = rgbToLab(rgb2.r, rgb2.g, rgb2.b);

    // 计算 Delta L
    const deltaL = lab2.L - lab1.L;

    // 计算 C (chroma)
    const C1 = Math.sqrt(lab1.a * lab1.a + lab1.b * lab1.b);
    const C2 = Math.sqrt(lab2.a * lab2.a + lab2.b * lab2.b);
    const deltaC = C2 - C1;

    // 计算 Delta H
    const deltaH = Math.sqrt(
        Math.pow(lab2.L - lab1.L, 2) +
        Math.pow(lab2.a - lab1.a, 2) +
        Math.pow(lab2.b - lab1.b, 2) - Math.pow(deltaL, 2) - Math.pow(deltaC, 2)
    );

    // 简化的 CIEDE2000 权重
    const kL = 1, kC = 1, kH = 1;
    const SL = 1, SC = 1, SH = 1;

    // 返回加权色差
    return Math.sqrt(
        Math.pow(deltaL / (kL * SL), 2) +
        Math.pow(deltaC / (kC * SC), 2) +
        Math.pow(deltaH / (kH * SH), 2)
    );
}

// 使用 LAB 色彩空间的颜色匹配
function findClosestColorLab(r, g, b) {
    let closestColor = '#000000';
    let minDistance = Infinity;
    const inputRgb = { r, g, b };

    for (const c of MARD_COLORS) {
        const rgb = hexToRgb(c.color);
        // 使用简化版 CIEDE2000
        const distance = ciede2000(inputRgb, rgb);
        if (distance < minDistance) {
            minDistance = distance;
            closestColor = c.color;
        }
    }

    return closestColor;
}

// 原来的 RGB 最近邻（保留作为备用）
function findClosestColor(r, g, b) {
    let closestColor = '#000000';
    let minDistance = Infinity;

    for (const c of MARD_COLORS) {
        const rgb = hexToRgb(c.color);
        // 使用带权重的欧几里得距离（人眼对绿色更敏感）
        const distance = Math.sqrt(
            Math.pow(r - rgb.r, 2) * 0.3 +
            Math.pow(g - rgb.g, 2) * 0.59 +
            Math.pow(b - rgb.b, 2) * 0.11
        );
        if (distance < minDistance) {
            minDistance = distance;
            closestColor = c.color;
        }
    }

    return closestColor;
}

function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
    } : { r: 0, g: 0, b: 0 };
}

function initEventListeners() {
    canvas.addEventListener('mousedown', handleCanvasMouseDown);
    canvas.addEventListener('mousemove', handleCanvasMouseMove);
    canvas.addEventListener('mouseup', handleCanvasMouseUp);
    canvas.addEventListener('mouseleave', () => {
        state.isDrawing = false;
        state.isPanning = false;
    });
    // 阻止右键菜单
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // 鼠标滚轮缩放
    document.getElementById('canvasContainer').addEventListener('wheel', (e) => {
        e.preventDefault();
        try {
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            const newZoom = Math.max(state.minZoom, Math.min(state.maxZoom, state.zoom + delta));

            // 以鼠标位置为中心缩放
            if (newZoom !== state.zoom && canvas) {
                const rect = canvas.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) {
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;

                    // 计算缩放前后鼠标在画布上的位置
                    const oldScaledX = (mouseX - state.panX) / state.zoom;
                    const oldScaledY = (mouseY - state.panY) / state.zoom;

                    state.zoom = newZoom;

                    // 调整平移使鼠标位置保持不变
                    state.panX = mouseX - oldScaledX * state.zoom;
                    state.panY = mouseY - oldScaledY * state.zoom;

                    updateCanvasTransform();
                    updateStatusBar();
                }
            }
        } catch (err) {
            console.warn('Wheel zoom error:', err);
        }
    }, { passive: false });

    // 铅笔工具
    document.getElementById('btnPencil').addEventListener('click', () => {
        state.currentTool = TOOLS.PENCIL;
        document.getElementById('btnPencil').classList.add('active');
        document.getElementById('btnEraser').classList.remove('active', 'eraser-active');
        canvas.style.cursor = 'crosshair';
    });

    // 橡皮擦工具
    document.getElementById('btnEraser').addEventListener('click', () => {
        state.currentTool = TOOLS.ERASER;
        document.getElementById('btnEraser').classList.add('active', 'eraser-active');
        document.getElementById('btnPencil').classList.remove('active');
        canvas.style.cursor = 'cell';
    });

    // 自定义尺寸选择
    document.getElementById('gridSizeSelect').addEventListener('change', (e) => {
        const customPanel = document.getElementById('customSizePanel');
        if (e.target.value === 'custom') {
            customPanel.style.display = 'block';
        } else {
            customPanel.style.display = 'none';
        }
    });

    // 图片转换事件
    document.getElementById('btnImageConvert').addEventListener('click', showImageConvertPanel);
    document.getElementById('imageInput').addEventListener('change', handleImageUpload);
    document.getElementById('btnConvert').addEventListener('click', convertImageToPattern);
    document.getElementById('btnCancelConvert').addEventListener('click', hideImageConvertPanel);

    // 模板库事件
    document.getElementById('btnTemplates').addEventListener('click', showTemplatePanel);
    document.getElementById('btnCloseTemplates').addEventListener('click', hideTemplatePanel);

    // 导出PNG
    document.getElementById('btnExport').addEventListener('click', exportAsPNG);

    // 清除画布
    document.getElementById('btnClear').addEventListener('click', () => {
        if (confirm('确定要清除当前图案吗？')) {
            initGridData();
            renderCanvas();
            saveToHistory();
        }
    });

    // 清除缓存
    document.getElementById('btnClearCache').addEventListener('click', () => {
        if (confirm('确定要清除所有已保存的数据吗？此操作不可恢复。')) {
            localStorage.removeItem(STORAGE_KEY);
            alert('缓存已清除');
        }
    });

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'z') {
            e.preventDefault();
            undo();
        } else if (e.ctrlKey && e.key === 'y') {
            e.preventDefault();
            redo();
        } else if (e.key === 'ArrowLeft') {
            state.panX += 50;
            renderCanvas();
        } else if (e.key === 'ArrowRight') {
            state.panX -= 50;
            renderCanvas();
        } else if (e.key === 'ArrowUp') {
            state.panY += 50;
            renderCanvas();
        } else if (e.key === 'ArrowDown') {
            state.panY -= 50;
            renderCanvas();
        } else if (e.key === ' ') {
            // 空格键重置平移
            state.panX = 0;
            state.panY = 0;
            renderCanvas();
        }
    });
}

// ============================================
// 颜色盘渲染
// ============================================

function renderColorPanel() {
    const colorList = document.getElementById('colorList');
    if (!colorList) return;
    colorList.innerHTML = '';

    // 按系列分组
    const seriesMap = {};
    MARD_COLORS.forEach(c => {
        const series = c.num.match(/^[A-Z]/)?.[0] || 'Other';
        if (!seriesMap[series]) seriesMap[series] = [];
        seriesMap[series].push(c);
    });

    // 渲染每个系列
    Object.keys(seriesMap).sort().forEach(series => {
        const seriesDiv = document.createElement('div');
        seriesDiv.className = 'color-series';
        seriesDiv.innerHTML = `<h4>${series}系列</h4>`;

        const colorsDiv = document.createElement('div');
        colorsDiv.className = 'color-grid';
        colorsDiv.style.display = 'grid';
        colorsDiv.style.gridTemplateColumns = 'repeat(6, 1fr)';
        colorsDiv.style.gap = '4px';

        seriesMap[series].forEach(c => {
            const colorBtn = document.createElement('button');
            colorBtn.className = 'color-btn';
            colorBtn.style.backgroundColor = c.color;
            colorBtn.style.width = '28px';
            colorBtn.style.height = '28px';
            colorBtn.style.border = '2px solid transparent';
            colorBtn.style.borderRadius = '4px';
            colorBtn.style.cursor = 'pointer';
            colorBtn.title = `${c.num} - ${c.type}`;

            if (c.type !== 'normal') {
                colorBtn.style.boxShadow = '0 0 4px ' + c.color;
            }

            colorBtn.addEventListener('click', () => {
                state.currentColor = c.color;
                document.querySelectorAll('.color-btn').forEach(b => {
                    b.style.border = '2px solid transparent';
                });
                colorBtn.style.border = '2px solid white';
            });

            colorsDiv.appendChild(colorBtn);
        });

        seriesDiv.appendChild(colorsDiv);
        colorList.appendChild(seriesDiv);
    });
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', () => {
    initCanvas();
    loadFromStorage(); // 尝试从 LocalStorage 加载数据
    initEventListeners();
    renderColorPanel();
});
</script>
