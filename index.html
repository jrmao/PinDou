<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinDou - 拼豆图案设计工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        .toolbar button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .toolbar button.active {
            background: #e94560;
            color: white;
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左侧颜色盘 */
        .color-panel {
            width: 220px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            overflow-y: auto;
            padding: 12px;
        }

        /* 画布区域 */
        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f0f23;
            overflow: hidden;
            position: relative;
        }

        #pixelCanvas {
            border: 2px solid #e94560;
            cursor: crosshair;
            image-rendering: pixelated;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            gap: 24px;
            padding: 8px 16px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <button id="btnEditor" class="active" title="像素画编辑器">编辑器</button>
            <button id="btnImageConvert" title="图片转图案">图片转图案</button>
            <button id="btnTemplates" title="图案模板库">模板库</button>
            <div style="flex:1"></div>
            <button id="btnExport" title="导出PNG">导出PNG</button>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧颜色盘 -->
            <div class="color-panel" id="colorPanel">
                <h3>颜色盘</h3>
                <div id="colorList"></div>
            </div>

            <!-- 画布区域 -->
            <div class="canvas-container" id="canvasContainer">
                <canvas id="pixelCanvas"></canvas>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <span id="statusSize">画布: 29×29</span>
            <span id="statusZoom">缩放: 100%</span>
        </div>
    </div>
</body>
<script>
'use strict';

// ============================================
// 常量配置
// ============================================

// TODO: Mard 291 色数据将在 Task 5 中填充
const COLORS = {};

// 工具定义
const TOOLS = {
    PENCIL: 'pencil',
    ERASER: 'eraser',
    FILL: 'fill',
    RECT: 'rect',
    LINE: 'line'
};

// 画布限制
const CANVAS_MIN_SIZE = 10;
const CANVAS_MAX_SIZE = 200;
const DEFAULT_CANVAS_SIZE = 29;

// ============================================
// 状态管理
// ============================================

const state = {
    canvasWidth: DEFAULT_CANVAS_SIZE,
    canvasHeight: DEFAULT_CANVAS_SIZE,
    currentTool: TOOLS.PENCIL,
    currentColor: '#FF0000',
    zoom: 1,
    isDrawing: false,
    startX: 0,
    startY: 0,
    gridData: null,  // 二维数组存储像素颜色
    history: [],     // 撤销/重做历史
    historyIndex: -1
};

// 初始化 gridData
initGridData();

// ============================================
// 工具函数
// ============================================

function deepCopy(obj) {
    return structuredClone(obj);
}

function initGridData() {
    state.gridData = [];
    for (let y = 0; y < state.canvasHeight; y++) {
        const row = [];
        for (let x = 0; x < state.canvasWidth; x++) {
            row.push(null);
        }
        state.gridData.push(row);
    }
}

function saveToHistory() {
    // 移除当前位置之后的历史
    state.history = state.history.slice(0, state.historyIndex + 1);
    // 保存当前状态
    state.history.push(deepCopy(state.gridData));
    state.historyIndex++;
    // 限制历史记录数量
    if (state.history.length > 50) {
        state.history.shift();
        state.historyIndex--;
    }
}

function undo() {
    if (state.historyIndex > 0) {
        state.historyIndex--;
        state.gridData = deepCopy(state.history[state.historyIndex]);
        renderCanvas();
    }
}

function redo() {
    if (state.historyIndex < state.history.length - 1) {
        state.historyIndex++;
        state.gridData = deepCopy(state.history[state.historyIndex]);
        renderCanvas();
    }
}

// ============================================
// 画布操作
// ============================================

let canvas, ctx;
const PIXEL_SIZE = 16;  // 每个像素在屏幕上的大小

function initCanvas() {
    canvas = document.getElementById('pixelCanvas');
    ctx = canvas.getContext('2d');

    // 设置 canvas 尺寸
    canvas.width = state.canvasWidth * PIXEL_SIZE;
    canvas.height = state.canvasHeight * PIXEL_SIZE;

    // 初始化网格数据
    initGridData();

    // 渲染
    renderCanvas();

    // 保存初始历史
    saveToHistory();
}

function renderCanvas() {
    // 清空画布
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 绘制每个像素
    for (let y = 0; y < state.canvasHeight; y++) {
        for (let x = 0; x < state.canvasWidth; x++) {
            const color = state.gridData[y][x];
            if (color) {
                ctx.fillStyle = color;
                ctx.fillRect(
                    x * PIXEL_SIZE,
                    y * PIXEL_SIZE,
                    PIXEL_SIZE,
                    PIXEL_SIZE
                );
            }
        }
    }

    // 绘制网格线
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= state.canvasWidth; x++) {
        ctx.beginPath();
        ctx.moveTo(x * PIXEL_SIZE, 0);
        ctx.lineTo(x * PIXEL_SIZE, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y <= state.canvasHeight; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * PIXEL_SIZE);
        ctx.lineTo(canvas.width, y * PIXEL_SIZE);
        ctx.stroke();
    }

    updateStatusBar();
}

// 事件处理
function handleCanvasMouseDown(e) {
    state.isDrawing = true;
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / PIXEL_SIZE);
    const y = Math.floor((e.clientY - rect.top) / PIXEL_SIZE);
    state.startX = x;
    state.startY = y;

    if (state.currentTool === TOOLS.FILL) {
        floodFill(x, y, state.currentColor);
    } else {
        setPixel(x, y, state.currentColor);
    }
}

function handleCanvasMouseMove(e) {
    if (!state.isDrawing) return;

    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / PIXEL_SIZE);
    const y = Math.floor((e.clientY - rect.top) / PIXEL_SIZE);

    if (state.currentTool === TOOLS.PENCIL) {
        setPixel(x, y, state.currentColor);
    } else if (state.currentTool === TOOLS.ERASER) {
        setPixel(x, y, null);
    }
}

function handleCanvasMouseUp(e) {
    if (state.isDrawing && state.currentTool !== TOOLS.PENCIL && state.currentTool !== TOOLS.ERASER && state.currentTool !== TOOLS.FILL) {
        // 矩形和直线工具
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / PIXEL_SIZE);
        const y = Math.floor((e.clientY - rect.top) / PIXEL_SIZE);
        drawShape(state.startX, state.startY, x, y, state.currentColor);
    }
    state.isDrawing = false;
    saveToHistory();
}

function setPixel(x, y, color) {
    if (x >= 0 && x < state.canvasWidth && y >= 0 && y < state.canvasHeight) {
        state.gridData[y][x] = color;
        renderCanvas();
    }
}

function floodFill(x, y, color) {
    const targetColor = state.gridData[y][x];
    if (targetColor === color) return;

    const stack = [[x, y]];
    const visited = new Set();

    while (stack.length > 0) {
        const [cx, cy] = stack.pop();
        const key = `${cx},${cy}`;

        if (visited.has(key)) continue;
        if (cx < 0 || cx >= state.canvasWidth || cy < 0 || cy >= state.canvasHeight) continue;
        if (state.gridData[cy][cx] !== targetColor) continue;

        visited.add(key);
        state.gridData[cy][cx] = color;

        stack.push([cx + 1, cy]);
        stack.push([cx - 1, cy]);
        stack.push([cx, cy + 1]);
        stack.push([cx, cy - 1]);
    }

    renderCanvas();
}

function drawShape(x1, y1, x2, y2, color) {
    // 简化的矩形绘制
    const minX = Math.min(x1, x2);
    const maxX = Math.max(x1, x2);
    const minY = Math.min(y1, y2);
    const maxY = Math.max(y1, y2);

    for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
            if (x >= 0 && x < state.canvasWidth && y >= 0 && y < state.canvasHeight) {
                state.gridData[y][x] = color;
            }
        }
    }

    renderCanvas();
}

function updateStatusBar() {
    document.getElementById('statusSize').textContent =
        `画布: ${state.canvasWidth}×${state.canvasHeight}`;
    document.getElementById('statusZoom').textContent =
        `缩放: ${Math.round(state.zoom * 100)}%`;
}

// ============================================
// 工具函数
// ============================================

function deepCopy(obj) {
    return structuredClone(obj);
}

function initGridData() {
    state.gridData = [];
    for (let y = 0; y < state.canvasHeight; y++) {
        const row = [];
        for (let x = 0; x < state.canvasWidth; x++) {
            row.push(null);
        }
        state.gridData.push(row);
    }
}

function saveToHistory() {
    // 移除当前位置之后的历史
    state.history = state.history.slice(0, state.historyIndex + 1);
    // 保存当前状态
    state.history.push(deepCopy(state.gridData));
    state.historyIndex++;
    // 限制历史记录数量
    if (state.history.length > 50) {
        state.history.shift();
        state.historyIndex--;
    }
}

function undo() {
    if (state.historyIndex > 0) {
        state.historyIndex--;
        state.gridData = deepCopy(state.history[state.historyIndex]);
        renderCanvas();
    }
}

function redo() {
    if (state.historyIndex < state.history.length - 1) {
        state.historyIndex++;
        state.gridData = deepCopy(state.history[state.historyIndex]);
        renderCanvas();
    }
}

function initEventListeners() {
    canvas.addEventListener('mousedown', handleCanvasMouseDown);
    canvas.addEventListener('mousemove', handleCanvasMouseMove);
    canvas.addEventListener('mouseup', handleCanvasMouseUp);
    canvas.addEventListener('mouseleave', () => { state.isDrawing = false; });

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'z') {
            e.preventDefault();
            undo();
        } else if (e.ctrlKey && e.key === 'y') {
            e.preventDefault();
            redo();
        }
    });
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', () => {
    initCanvas();
    initEventListeners();
});
</script>
</html>
