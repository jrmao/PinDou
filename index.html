<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinDou - 拼豆图案设计工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        .toolbar button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .toolbar button.active {
            background: #e94560;
            color: white;
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左侧颜色盘 */
        .color-panel {
            width: 220px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            overflow-y: auto;
            padding: 12px;
        }

        /* 画布区域 */
        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f0f23;
            overflow: hidden;
            position: relative;
        }

        #pixelCanvas {
            border: 2px solid #e94560;
            cursor: crosshair;
            image-rendering: pixelated;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            gap: 24px;
            padding: 8px 16px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <button id="btnEditor" class="active" title="像素画编辑器">编辑器</button>
            <button id="btnImageConvert" title="图片转图案">图片转图案</button>
            <button id="btnTemplates" title="图案模板库">模板库</button>
            <div style="flex:1"></div>
            <button id="btnExport" title="导出PNG">导出PNG</button>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧颜色盘 -->
            <div class="color-panel" id="colorPanel">
                <h3>颜色盘</h3>
                <div id="colorList"></div>
            </div>

            <!-- 画布区域 -->
            <div class="canvas-container" id="canvasContainer">
                <canvas id="pixelCanvas"></canvas>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <span id="statusSize">画布: 29×29</span>
            <span id="statusZoom">缩放: 100%</span>
        </div>
    </div>
</body>
<script>
'use strict';

// ============================================
// 常量配置
// ============================================

// TODO: Mard 291 色数据将在 Task 5 中填充
const COLORS = {};

// 工具定义
const TOOLS = {
    PENCIL: 'pencil',
    ERASER: 'eraser',
    FILL: 'fill',
    RECT: 'rect',
    LINE: 'line'
};

// 画布限制
const CANVAS_MIN_SIZE = 10;
const CANVAS_MAX_SIZE = 200;
const DEFAULT_CANVAS_SIZE = 29;

// ============================================
// 状态管理
// ============================================

const state = {
    canvasWidth: DEFAULT_CANVAS_SIZE,
    canvasHeight: DEFAULT_CANVAS_SIZE,
    currentTool: TOOLS.PENCIL,
    currentColor: '#FF0000',
    zoom: 1,
    isDrawing: false,
    startX: 0,
    startY: 0,
    gridData: null,  // 二维数组存储像素颜色
    history: [],     // 撤销/重做历史
    historyIndex: -1
};

// 初始化 gridData
initGridData();

// ============================================
// 工具函数
// ============================================

function deepCopy(obj) {
    return structuredClone(obj);
}

function initGridData() {
    state.gridData = [];
    for (let y = 0; y < state.canvasHeight; y++) {
        const row = [];
        for (let x = 0; x < state.canvasWidth; x++) {
            row.push(null);
        }
        state.gridData.push(row);
    }
}

function saveToHistory() {
    // 移除当前位置之后的历史
    state.history = state.history.slice(0, state.historyIndex + 1);
    // 保存当前状态
    state.history.push(deepCopy(state.gridData));
    state.historyIndex++;
    // 限制历史记录数量
    if (state.history.length > 50) {
        state.history.shift();
        state.historyIndex--;
    }
}

function undo() {
    if (state.historyIndex > 0) {
        state.historyIndex--;
        state.gridData = deepCopy(state.history[state.historyIndex]);
        renderCanvas();
    }
}

function redo() {
    if (state.historyIndex < state.history.length - 1) {
        state.historyIndex++;
        state.gridData = deepCopy(state.history[state.historyIndex]);
        renderCanvas();
    }
}

// renderCanvas 占位符，后续 Task 4 实现
function renderCanvas() {
    // TODO: 实现画布渲染
}
</script>
</html>
