<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinDou - 拼豆图案设计工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        .toolbar button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .toolbar button.active {
            background: #e94560;
            color: white;
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左侧颜色盘 */
        .color-panel {
            width: 220px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            overflow-y: auto;
            padding: 12px;
        }

        /* 画布区域 */
        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f0f23;
            overflow: hidden;
            position: relative;
        }

        #pixelCanvas {
            border: 2px solid #e94560;
            cursor: crosshair;
            image-rendering: pixelated;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            gap: 24px;
            padding: 8px 16px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <button id="btnEditor" class="active" title="像素画编辑器">编辑器</button>
            <button id="btnImageConvert" title="图片转图案">图片转图案</button>
            <button id="btnTemplates" title="图案模板库">模板库</button>
            <div style="flex:1"></div>
            <button id="btnExport" title="导出PNG">导出PNG</button>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧颜色盘 -->
            <div class="color-panel" id="colorPanel">
                <h3>颜色盘</h3>
                <div id="colorList"></div>
            </div>

            <!-- 画布区域 -->
            <div class="canvas-container" id="canvasContainer">
                <canvas id="pixelCanvas"></canvas>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <span id="statusSize">画布: 29×29</span>
            <span id="statusZoom">缩放: 100%</span>
        </div>
    </div>
</body>
</html>
